name: Release Build Matrix

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: GravitySim2D-Windows-x64
            binary_src: build/Release/GravitySim2D.exe
            binary_name: GravitySim2D.exe
          - os: ubuntu-latest
            artifact_name: GravitySim2D-Linux-x64
            binary_src: build/GravitySim2D
            binary_name: GravitySim2D

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install System Dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++ libx11-dev libxrandr-dev libudev-dev libgl1-mesa-dev libflac-dev libogg-dev libvorbis-dev libopenal-dev libfreetype6-dev

    - name: Download and Build SFML 3 Statically
      run: |
        curl -L -o sfml.tar.gz https://github.com
        tar -xzf sfml.tar.gz
        cd SFML-3.0.0
        cmake -B build_sfml -DCMAKE_BUILD_TYPE=Release -DSFML_BUILD_STATIC_LIBS=ON -DCMAKE_INSTALL_PREFIX=../sfml_install
        cmake --build build_sfml --target install --config Release
        cd ..

    - name: Configure CMake
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DSFML_DIR=${{ github.workspace }}/sfml_install/lib/cmake/SFML

    - name: Build Project
      run: cmake --build build --config Release

    - name: Prepare Artifact Directory
      shell: bash
      run: |
        mkdir -p GravitySim2D/build
        cp ${{ matrix.binary_src }} GravitySim2D/build/${{ matrix.binary_name }}
        cp -r assets GravitySim2D/assets

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: GravitySim2D/