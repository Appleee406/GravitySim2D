name: Build (static Release)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            triplet: x64-windows-static
          - os: ubuntu-latest
            triplet: x64-linux-static
          - os: macos-latest
            triplet: x64-osx-static
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgGitCommitId: '7d8c3e7f0d6f8e9c8a2b4c5d6e7f8a9b0c1d2e3f'

      - name: Cache vcpkg packages
        uses: actions/cache@v3
        with:
          path: |
            ${{ github.workspace }}/vcpkg/packages
            ${{ github.workspace }}/vcpkg/downloads
          key: ${{ runner.os }}-${{ matrix.triplet }}-${{ hashFiles('**/vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.triplet }}-
            ${{ runner.os }}-

      - name: Install SFML (static)
        run: |
          ${{ github.workspace }}/vcpkg/vcpkg install sfml:${{ matrix.triplet }}
        shell: bash

      - name: Configure CMake
        run: |
          cmake -B build \
                -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake \
                -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }} \
                -DSFML_STATIC_LIBRARIES=ON \
                -DCMAKE_CXX_COMPILE_DEFINITIONS=SFML_STATIC \
                -DCMAKE_BUILD_TYPE=Release
        shell: bash

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GravitySim2D-${{ matrix.os }}
          path: build/