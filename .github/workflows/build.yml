name: Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            triplet: x64-mingw-static
            static: true
          - os: ubuntu-latest
            triplet: x64-linux
            static: false
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y g++ cmake ninja-build libx11-dev libxrandr-dev libxcursor-dev libxi-dev libgl-dev libglu1-mesa-dev libasound2-dev libpulse-dev libudev-dev

      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          install: >-
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-git
            mingw-w64-ucrt-x86_64-pkg-config
          update: true

      - name: Install vcpkg (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          ./bootstrap-vcpkg.sh
          echo "$PWD" >> $GITHUB_PATH

      - name: Install vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          ./bootstrap-vcpkg.sh
          echo "$PWD" >> $GITHUB_PATH

      - name: Cache vcpkg packages
        uses: actions/cache@v3
        with:
          path: |
            vcpkg/packages
            vcpkg/downloads
          key: ${{ runner.os }}-${{ matrix.triplet }}-${{ hashFiles('**/vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.triplet }}-
            ${{ runner.os }}-

      - name: Install SFML (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: vcpkg install sfml:${{ matrix.triplet }}

      - name: Install SFML (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: vcpkg install sfml:${{ matrix.triplet }}

      - name: Configure CMake (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cmake -B build \
                -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake \
                -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }} \
                -DSFML_STATIC_LIBRARIES=${{ matrix.static }} \
                -DCMAKE_CXX_COMPILE_DEFINITIONS=${{ matrix.static && 'SFML_STATIC' || '' }} \
                -DCMAKE_BUILD_TYPE=Release

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          cmake -B build \
                -G "MinGW Makefiles" \
                -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake \
                -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }} \
                -DSFML_STATIC_LIBRARIES=${{ matrix.static }} \
                -DCMAKE_CXX_COMPILE_DEFINITIONS=${{ matrix.static && 'SFML_STATIC' || '' }} \
                -DCMAKE_BUILD_TYPE=Release

      - name: Build (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: cmake --build build --config Release --parallel

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: cmake --build build --config Release --parallel

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GravitySim2D-${{ matrix.os }}
          path: build/