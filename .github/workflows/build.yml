name: Build (static Release)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            triplet: x64-windows-static
          - os: ubuntu-latest
            triplet: x64-linux-static
          - os: macos-latest
            triplet: x64-osx-static
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install vcpkg
        shell: bash
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          ./bootstrap-vcpkg.sh
          echo "$PWD" >> $GITHUB_PATH
        if: runner.os != 'Windows'

      - name: Install vcpkg (Windows)
        shell: powershell
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          .\bootstrap-vcpkg.bat
          echo "$PWD" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        if: runner.os == 'Windows'

      - name: Cache vcpkg packages
        uses: actions/cache@v3
        with:
          path: |
            vcpkg/packages
            vcpkg/downloads
          key: ${{ runner.os }}-${{ matrix.triplet }}-${{ hashFiles('**/vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.triplet }}-
            ${{ runner.os }}-

      - name: Install SFML (static)
        shell: bash
        run: |
          vcpkg install sfml:${{ matrix.triplet }}

      - name: Configure CMake
        shell: bash
        run: |
          cmake -B build \
                -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake \
                -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }} \
                -DSFML_STATIC_LIBRARIES=ON \
                -DCMAKE_CXX_COMPILE_DEFINITIONS=SFML_STATIC \
                -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: bash
        run: cmake --build build --config Release --parallel

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GravitySim2D-${{ matrix.os }}
          path: build/